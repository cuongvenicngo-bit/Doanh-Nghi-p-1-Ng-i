<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xây dựng & Vận hành Hệ thống · One Person Company Đẳng cấp Tập đoàn — Chỉ với 1 Người</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1017; --bg2:#141925; --bg3:#1b2233; --card:#151b28;
  --ink:#eef1f8; --muted:#98a2b6; --faint:#6b748a;
  --gold:#e7b85a; --gold-soft:#f4d391; --gold-dim:rgba(231,184,90,.14);
  --emerald:#3ddc97; --emerald-dim:rgba(61,220,151,.13);
  --rose:#fb7185; --rose-dim:rgba(251,113,133,.12);
  --indigo:#8b95f6; --indigo-dim:rgba(139,149,246,.13);
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.13);
  --sh:0 10px 40px -12px rgba(0,0,0,.55);
  --accent-grad:linear-gradient(135deg,#1a2233,#11151e);
  --rad:18px; --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --display:'Plus Jakarta Sans',var(--font);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font); background:var(--bg); color:var(--ink);
  line-height:1.6; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 12% -8%,rgba(231,184,90,.07),transparent 60%),radial-gradient(800px 600px at 100% 0%,rgba(139,149,246,.08),transparent 55%);
  background-attachment:fixed;
}
::selection{background:var(--gold-dim);color:var(--gold-soft)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ---------- LAYOUT ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:266px;flex-shrink:0;position:sticky;top:0;height:100vh;
  background:linear-gradient(180deg,#10141d,#0c0f16);
  border-right:1px solid var(--line);padding:26px 18px;display:flex;flex-direction:column;gap:6px;
  overflow-y:auto;z-index:40;
}
.brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px}
.brand .logo{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#b98722);
  display:grid;place-items:center;font-family:var(--display);font-weight:800;color:#1a1206;font-size:20px;
  box-shadow:0 6px 18px -4px rgba(231,184,90,.5);
}
.brand h1{font-family:var(--display);font-size:15px;font-weight:800;letter-spacing:.2px;line-height:1.25}
.brand span{font-size:11.5px;color:var(--faint);font-weight:500}
.nav-label{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--faint);padding:14px 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:12px;
  color:var(--muted);font-size:14px;font-weight:500;transition:.18s;position:relative;width:100%;text-align:left;
}
.nav-item .ic{width:19px;height:19px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.7}
.ic-chip{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;transition:.18s}
.ic-chip .ic{width:17px;height:17px}
.nav-item:hover .ic-chip{transform:scale(1.08)}
.nav-item.active .ic-chip{box-shadow:0 0 0 1px currentColor inset}
.nav-item:hover{background:var(--bg3);color:var(--ink)}
.nav-item.active{background:var(--gold-dim);color:var(--gold-soft);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-18px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--gold)}
.nav-badge{margin-left:auto;font-size:11px;background:var(--bg3);padding:1px 8px;border-radius:20px;color:var(--muted)}
.side-foot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint)}

.main{flex:1;min-width:0;padding:34px 44px 80px;max-width:1180px}
.topbar{display:none}

/* ---------- HEADINGS ---------- */
.page{display:none;animation:fade .4s ease}
.page.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.h-title{font-family:var(--display);font-size:clamp(26px,3.4vw,38px);font-weight:800;line-height:1.12;letter-spacing:-.5px}
.h-sub{color:var(--muted);font-size:15.5px;margin-top:12px;max-width:680px}
.section-head{margin:42px 0 20px}
.section-head h3{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:-.3px}
.section-head p{color:var(--muted);font-size:14px;margin-top:5px}

/* ---------- CARDS ---------- */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{
  background:linear-gradient(160deg,var(--card),#11161f);
  border:1px solid var(--line);border-radius:var(--rad);padding:22px;transition:.22s;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--line2);transform:translateY(-3px);box-shadow:var(--sh)}

/* hero / dashboard */
.hero{
  background:linear-gradient(135deg,#1a2233,#11151e 60%);
  border:1px solid var(--line);border-radius:24px;padding:34px;position:relative;overflow:hidden;
}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(231,184,90,.16),transparent 70%)}
.hero .quote{font-family:var(--display);font-size:clamp(18px,2vw,23px);font-weight:700;line-height:1.4;max-width:620px;margin-top:8px}
.hero .by{color:var(--gold);font-size:13px;margin-top:14px;font-weight:500}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px}
.stat .n{font-family:var(--display);font-size:26px;font-weight:800;color:var(--gold-soft)}
.stat .l{font-size:12px;color:var(--muted);margin-top:3px}

.ring-wrap{display:flex;align-items:center;gap:20px}
.ring{position:relative;width:96px;height:96px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:21px}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:30px;letter-spacing:.3px}
.pill.gold{background:var(--gold-dim);color:var(--gold-soft)}
.pill.em{background:var(--emerald-dim);color:var(--emerald)}
.pill.ro{background:var(--rose-dim);color:var(--rose)}
.pill.in{background:var(--indigo-dim);color:var(--indigo)}

/* message cards */
.msg-card{cursor:pointer}
.msg-card .num{font-family:var(--display);font-size:13px;font-weight:800;color:var(--gold);background:var(--gold-dim);width:30px;height:30px;border-radius:9px;display:grid;place-items:center;margin-bottom:14px}
.msg-card h4{font-family:var(--display);font-size:17px;font-weight:700;line-height:1.3;margin-bottom:9px}
.msg-card p{color:var(--muted);font-size:13.8px}
.msg-card .src{margin-top:14px;font-size:11px;color:var(--faint);display:flex;align-items:center;gap:6px}
.check-dot{position:absolute;top:18px;right:18px;width:22px;height:22px;border-radius:50%;border:1.8px solid var(--line2);transition:.2s;display:grid;place-items:center}
.check-dot svg{width:12px;height:12px;stroke:#0d1017;stroke-width:3;opacity:0}
.msg-card.done .check-dot{background:var(--emerald);border-color:var(--emerald)}
.msg-card.done .check-dot svg{opacity:1}
.msg-card.done{border-color:rgba(61,220,151,.3)}

/* action cards */
.act{display:flex;gap:16px;align-items:flex-start}
.act .ico{width:44px;height:44px;border-radius:12px;background:var(--indigo-dim);display:grid;place-items:center;flex-shrink:0;font-size:20px}
.act h4{font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:4px}
.act .from{font-size:12px;color:var(--gold);margin-bottom:9px;font-style:italic}
.act ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.act li{font-size:13.6px;color:var(--muted);padding-left:20px;position:relative}
.act li::before{content:"→";position:absolute;left:0;color:var(--indigo);font-weight:700}

/* quiz */
.quiz-shell{max-width:760px}
.q-progress{height:7px;border-radius:6px;background:var(--bg3);overflow:hidden;margin-bottom:26px}
.q-progress span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:.4s;border-radius:6px}
.q-card .qnum{font-size:12.5px;color:var(--gold);font-weight:600;letter-spacing:.5px}
.q-card .qtext{font-family:var(--display);font-size:21px;font-weight:700;line-height:1.4;margin:8px 0 22px}
.opt{
  display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:15px 17px;border-radius:13px;
  background:var(--bg2);border:1.5px solid var(--line);margin-bottom:11px;transition:.16s;font-size:14.5px;
}
.opt:hover:not(:disabled){border-color:var(--gold);background:var(--bg3)}
.opt .key{width:26px;height:26px;border-radius:7px;background:var(--bg3);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0;transition:.16s}
.opt.correct{border-color:var(--emerald);background:var(--emerald-dim)}
.opt.correct .key{background:var(--emerald);color:#06231a}
.opt.wrong{border-color:var(--rose);background:var(--rose-dim)}
.opt.wrong .key{background:var(--rose);color:#2a0a10}
.opt:disabled{cursor:default}
.explain{background:var(--bg2);border-left:3px solid var(--gold);border-radius:10px;padding:14px 16px;font-size:13.6px;color:var(--muted);margin-top:6px;display:none;animation:fade .3s}
.explain.show{display:block}
.explain b{color:var(--ink)}
.q-foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.btn{
  background:linear-gradient(135deg,var(--gold),#c79434);color:#1a1206;font-weight:700;font-size:14px;
  padding:12px 24px;border-radius:12px;transition:.18s;display:inline-flex;align-items:center;gap:8px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px -6px rgba(231,184,90,.5)}
.btn.ghost{background:var(--bg3);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{box-shadow:none;border-color:var(--line2)}
.btn:disabled{opacity:.4;pointer-events:none}
.result{text-align:center;padding:40px 20px}
.result .big{font-family:var(--display);font-size:64px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold-soft));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.result h3{font-family:var(--display);font-size:24px;margin:6px 0 10px}
.result p{color:var(--muted);max-width:440px;margin:0 auto 22px}

/* flashcards */
.fc-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.fc-counter{font-family:var(--display);font-size:14px;color:var(--muted)}
.fc-counter b{color:var(--gold-soft);font-size:18px}
.flashcard{
  perspective:1600px;height:360px;cursor:pointer;max-width:620px;margin:0 auto;
}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;padding:40px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid var(--line);
}
.fc-front{background:linear-gradient(155deg,#1a2132,#10141d)}
.fc-front .tag{margin-bottom:18px}
.fc-front .term{font-family:var(--display);font-size:27px;font-weight:800;line-height:1.25}
.fc-front .hint{margin-top:auto;font-size:12px;color:var(--faint);display:flex;align-items:center;gap:6px}
.fc-back{background:linear-gradient(155deg,#1d2a23,#11161a);transform:rotateY(180deg)}
.fc-back .def{font-size:16px;line-height:1.6;color:var(--ink)}
.fc-back .src{margin-top:18px;font-size:11.5px;color:var(--emerald)}
.fc-nav{display:flex;justify-content:center;gap:12px;margin-top:24px}
.fc-dot-row{display:flex;gap:6px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.fc-dot{width:8px;height:8px;border-radius:50%;background:var(--bg3);transition:.2s;cursor:pointer}
.fc-dot.active{background:var(--gold);width:22px;border-radius:5px}

/* mistakes */
.mis{border-left:3px solid var(--rose)}
.mis .head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.mis .skull{font-size:22px}
.mis h4{font-family:var(--display);font-size:16.5px;font-weight:700;flex:1}
.mis .score{font-size:11.5px;font-weight:700;color:var(--rose);background:var(--rose-dim);padding:3px 9px;border-radius:7px;white-space:nowrap}
.mis .lbl{font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;margin:13px 0 5px}
.mis .lbl.warn{color:var(--rose)}
.mis .lbl.fix{color:var(--emerald)}
.mis p{font-size:13.5px;color:var(--muted)}

/* plan */
.plan-tabs{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:8px}
.plan-tab{padding:9px 20px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted);transition:.18s}
.plan-tab.active{background:var(--gold);color:#1a1206}
.day{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.day:last-child{border-bottom:none}
.day .dnum{
  width:46px;height:46px;border-radius:13px;background:var(--bg3);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--display);transition:.2s;
}
.day .dnum small{font-size:9px;color:var(--faint);letter-spacing:.5px}
.day .dnum b{font-size:18px;font-weight:800;line-height:1}
.day .body{flex:1}
.day .body h4{font-family:var(--display);font-size:15.5px;font-weight:700;margin-bottom:3px}
.day .body p{font-size:13.3px;color:var(--muted)}
.day .body .kpi{margin-top:7px;font-size:12px;color:var(--gold);display:inline-flex;align-items:center;gap:6px}
.day .tick{
  width:26px;height:26px;border-radius:8px;border:1.8px solid var(--line2);flex-shrink:0;margin-top:10px;
  display:grid;place-items:center;transition:.18s;cursor:pointer;
}
.day .tick svg{width:13px;height:13px;stroke:#0d1017;stroke-width:3;opacity:0}
.day.done .tick{background:var(--emerald);border-color:var(--emerald)}
.day.done .tick svg{opacity:1}
.day.done .dnum{background:var(--emerald-dim)}
.day.done .dnum b{color:var(--emerald)}
.day.done .body h4{text-decoration:line-through;text-decoration-color:var(--faint);color:var(--muted)}

/* system / operations */
.sys-table{width:100%;border-collapse:collapse;font-size:13.3px;margin-top:6px;overflow:hidden;border-radius:12px}
.sys-table th{text-align:left;padding:12px 14px;background:var(--bg3);color:var(--gold-soft);font-weight:600;font-size:12px;letter-spacing:.3px;border-bottom:1px solid var(--line)}
.sys-table td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--muted);vertical-align:top}
.sys-table tr:last-child td{border-bottom:none}
.sys-table td:first-child{color:var(--ink);font-weight:600}
.sys-table .hl{color:var(--gold-soft);font-weight:600}
.sys-table tbody tr{background:var(--bg2)}
.sys-table tbody tr:hover{background:var(--bg3)}
.flow{display:flex;flex-direction:column;align-items:center;gap:0;margin:8px 0}
.flow-node{width:100%;max-width:540px;background:linear-gradient(160deg,var(--card),#11161f);border:1px solid var(--line);border-radius:14px;padding:15px 20px;text-align:center;transition:.18s}
.flow-node:hover{border-color:var(--gold);transform:scale(1.02)}
.flow-node .fn-t{font-family:var(--display);font-weight:700;font-size:15px}
.flow-node .fn-d{font-size:12.5px;color:var(--muted);margin-top:2px}
.flow-node.accent{border-color:var(--gold-dim);background:linear-gradient(160deg,#1d2330,#13171f)}
.flow-arrow{color:var(--gold);font-size:20px;line-height:1;padding:7px 0}
.stack{display:flex;flex-direction:column;gap:0;max-width:560px;margin:6px auto}
.stack-layer{border:1px solid var(--line);padding:14px 18px;background:var(--bg2);position:relative;transition:.18s}
.stack-layer:first-child{border-radius:14px 14px 0 0}
.stack-layer:last-child{border-radius:0 0 14px 14px;background:var(--gold-dim);border-color:var(--gold)}
.stack-layer:not(:last-child){border-bottom:none}
.stack-layer:hover{background:var(--bg3)}
.stack-layer:last-child:hover{background:var(--gold-dim)}
.stack-layer .sl-emo{font-size:17px;margin-right:9px}
.stack-layer .sl-t{font-family:var(--display);font-weight:700;font-size:14.5px;display:inline}
.stack-layer .sl-d{font-size:12.5px;color:var(--muted);margin-top:3px}
.stack-layer:last-child .sl-d{color:var(--gold-soft)}
.round{display:flex;gap:15px;padding:15px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.round:last-child{border-bottom:none}
.round .rn{width:40px;height:40px;border-radius:11px;background:var(--indigo-dim);color:var(--indigo);font-family:var(--display);font-weight:800;display:grid;place-items:center;flex-shrink:0;font-size:13px;text-align:center;line-height:1.1}
.round .rb h4{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:3px}
.round .rb p{font-size:13.3px;color:var(--muted)}
.kv{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv .k{flex:0 0 130px;font-weight:600;color:var(--ink);font-size:13.5px}
.kv .v{flex:1;color:var(--muted);font-size:13.5px}
.rcoc{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.rcoc .rc{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;transition:.18s}
.rcoc .rc:hover{border-color:var(--gold);transform:translateY(-3px)}
.rcoc .rc .big-l{font-family:var(--display);font-size:30px;font-weight:800;color:var(--gold)}
.rcoc .rc .rc-t{font-weight:700;font-size:14px;margin:6px 0 5px}
.rcoc .rc .rc-d{font-size:12.3px;color:var(--muted)}
@media(max-width:760px){.rcoc{grid-template-columns:repeat(2,1fr)}.kv{flex-direction:column;gap:3px}.kv .k{flex:none}}

/* download file cards */
.dl-file{display:flex;align-items:center;gap:12px;padding:11px 15px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;margin-bottom:8px;transition:.16s;text-decoration:none;color:var(--ink)}
.dl-file:hover{border-color:var(--gold);transform:translateX(3px)}
.dl-file .dl-ic{width:30px;height:30px;border-radius:8px;background:var(--gold-dim);color:var(--gold-soft);display:grid;place-items:center;font-size:14px;flex-shrink:0}
.dl-file .dl-n{flex:1;font-size:13.4px;font-weight:600;font-family:'Inter',monospace;word-break:break-all}
.dl-file .dl-p{font-size:11px;color:var(--faint);flex-shrink:0}

/* departments training */
.dept-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:24px 0 8px}
.dept-chip{
  background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px 10px;text-align:center;transition:.18s;cursor:pointer;
}
.dept-chip:hover{border-color:var(--line2);transform:translateY(-2px)}
.dept-chip.active{background:var(--gold-dim);border-color:var(--gold)}
.dept-chip .emo{font-size:24px;display:block;margin-bottom:6px}
.dept-chip .nm{font-size:12px;font-weight:600;color:var(--muted);line-height:1.3}
.dept-chip.active .nm{color:var(--gold-soft)}
.dept-head{display:flex;align-items:center;gap:16px;margin:26px 0 4px}
.dept-head .big-emo{width:60px;height:60px;border-radius:16px;background:var(--gold-dim);display:grid;place-items:center;font-size:30px;flex-shrink:0}
.dept-head h3{font-family:var(--display);font-size:24px;font-weight:800}
.dept-head p{color:var(--muted);font-size:13px;margin-top:2px}
.dtabs{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 22px;border-bottom:1px solid var(--line);padding-bottom:0}
.dtab{padding:11px 16px;border-radius:10px 10px 0 0;font-size:13.5px;font-weight:600;color:var(--muted);transition:.16s;border-bottom:2px solid transparent;margin-bottom:-1px}
.dtab:hover{color:var(--ink)}
.dtab.active{color:var(--gold-soft);border-bottom-color:var(--gold)}
.dtab .c{font-size:11px;background:var(--bg3);padding:1px 7px;border-radius:20px;margin-left:5px}
.layer-row{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.layer-row:last-child{border-bottom:none}
.layer-row .ln{width:34px;height:34px;border-radius:10px;background:var(--indigo-dim);color:var(--indigo);font-family:var(--display);font-weight:800;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.layer-row p{font-size:14px;color:var(--ink);line-height:1.55}
.gap-item{display:flex;gap:13px;padding:13px 16px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;margin-bottom:9px;transition:.16s;cursor:pointer}
.gap-item:hover{border-color:var(--line2)}
.gap-item .qn{font-family:var(--display);font-weight:800;color:var(--gold);flex-shrink:0;font-size:14px;width:24px}
.gap-item .qx{font-size:13.8px;color:var(--ink);flex:1}
.gap-item .tk{width:22px;height:22px;border-radius:6px;border:1.6px solid var(--line2);flex-shrink:0;display:grid;place-items:center;transition:.16s;margin-top:1px}
.gap-item .tk svg{width:11px;height:11px;stroke:#0d1017;stroke-width:3;opacity:0}
.gap-item.ok .tk{background:var(--emerald);border-color:var(--emerald)}
.gap-item.ok .tk svg{opacity:1}
.gap-item.ok .qx{color:var(--muted)}
@media(max-width:920px){.dept-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.dept-grid{grid-template-columns:repeat(2,1fr)}}

/* ===== LIGHT THEME ===== */
[data-theme="light"]{
  --bg:#dfe3ea; --bg2:#eef0f5; --bg3:#d7dce5; --card:#eef0f5;
  --ink:#222a3a; --muted:#515b6e; --faint:#828c9e;
  --accent-grad:linear-gradient(135deg,#e8e0cf,#eef0f5);
  --gold:#9c6f1c; --gold-soft:#86600f; --gold-dim:rgba(156,111,28,.16);
  --emerald:#0f8a60; --emerald-dim:rgba(15,138,96,.14);
  --rose:#c8455d; --rose-dim:rgba(200,69,93,.12);
  --indigo:#4a57c4; --indigo-dim:rgba(74,87,196,.14);
  --line:rgba(25,35,65,.13); --line2:rgba(25,35,65,.20);
  --sh:0 12px 36px -16px rgba(40,55,95,.28);
}
[data-theme="light"] body{background-color:#dfe3ea;background-image:radial-gradient(900px 500px at 12% -8%,rgba(156,111,28,.07),transparent 60%),radial-gradient(800px 600px at 100% 0%,rgba(74,87,196,.07),transparent 55%)}
[data-theme="light"] .sidebar{background:linear-gradient(180deg,#e9ecf2,#e2e5ec)}
[data-theme="light"] .topbar{background:rgba(228,231,238,.92)}
[data-theme="light"] .card{background:linear-gradient(160deg,#eef0f5,#e8ebf1)}
[data-theme="light"] .hero{background:linear-gradient(135deg,#ece4d2,#e9ebf1 62%)}
[data-theme="light"] .flow-node{background:#eef0f5}
[data-theme="light"] .flow-node.accent{background:#ece4d2}
[data-theme="light"] .fc-front{background:linear-gradient(155deg,#eef0f5,#e2e6ee)}
[data-theme="light"] .fc-back{background:linear-gradient(155deg,#dcefe6,#e6f1ec)}
[data-theme="light"] .stack-layer{background:#eef0f5}
[data-theme="light"] .stack-layer:last-child{background:var(--gold-dim)}
[data-theme="light"] .opt,[data-theme="light"] .cl-item,[data-theme="light"] .gap-item,[data-theme="light"] .stat,[data-theme="light"] .sys-table tbody tr,[data-theme="light"] .gloss-item,[data-theme="light"] .sr-item,[data-theme="light"] .dept-chip,[data-theme="light"] .role-card,[data-theme="light"] .sk-dot{background:#e7eaf1}
[data-theme="light"] .search-box,[data-theme="light"] .q-pill,[data-theme="light"] .mini-btn,[data-theme="light"] .icon-btn{background:#e7eaf1}
[data-theme="light"] .prompt-out,[data-theme="light"] .rcoc-build textarea{background:#e7eaf1}

/* ===== icon / toolbar buttons ===== */
.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:9px;background:var(--bg3);border:1px solid var(--line);transition:.16s;font-size:15px}
.icon-btn:hover{border-color:var(--gold);color:var(--gold-soft)}
.side-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.mini-btn{font-size:11.5px;padding:6px 11px;border-radius:9px;background:var(--bg3);border:1px solid var(--line);color:var(--muted);transition:.16s}
.mini-btn:hover{border-color:var(--gold);color:var(--gold-soft)}

/* ===== search ===== */
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin:4px 0 6px;cursor:text}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:13.5px}
.search-box .sx{font-size:14px;color:var(--faint)}
.search-results{margin-top:8px;display:flex;flex-direction:column;gap:7px}
.sr-item{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px 15px;cursor:pointer;transition:.16s}
.sr-item:hover{border-color:var(--gold);transform:translateX(3px)}
.sr-item .sr-tag{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);font-weight:600}
.sr-item .sr-t{font-size:14px;font-weight:600;margin:2px 0}
.sr-item .sr-d{font-size:12.5px;color:var(--muted)}
.sr-empty{color:var(--faint);font-size:13.5px;padding:20px;text-align:center}

/* ===== glossary ===== */
.gloss-item{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:15px 18px;transition:.16s}
.gloss-item:hover{border-color:var(--line2)}
.gloss-item .gt{font-family:var(--display);font-weight:700;font-size:15px;color:var(--gold-soft)}
.gloss-item .gd{font-size:13.4px;color:var(--muted);margin-top:5px}

/* ===== role select ===== */
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.role-card{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:16px;cursor:pointer;transition:.16s}
.role-card:hover{border-color:var(--line2);transform:translateY(-2px)}
.role-card.active{border-color:var(--gold);background:var(--gold-dim)}
.role-card .rc-n{font-family:var(--display);font-weight:700;font-size:15px}
.role-card .rc-x{font-size:12.5px;color:var(--muted);margin-top:3px}
.role-card .rc-c{font-size:11.5px;color:var(--gold);margin-top:8px}

/* ===== skill matrix ===== */
.skill-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.skill-row:last-child{border-bottom:none}
.skill-row .sk-n{flex:1;font-size:13.8px;font-weight:600;display:flex;align-items:center;gap:8px}
.sk-levels{display:flex;gap:5px}
.sk-dot{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:700;cursor:pointer;transition:.14s;color:var(--faint)}
.sk-dot:hover{border-color:var(--gold)}
.sk-dot.on{color:#0d1017}
.sk-dot.l1.on{background:#fb7185}.sk-dot.l2.on{background:#fbbf24}.sk-dot.l3.on{background:#3ddc97}.sk-dot.l4.on{background:#34a8e0}.sk-dot.l0.on{background:var(--faint)}
[data-theme="light"] .sk-dot.on{color:#fff}

/* ===== R-C-O-C builder ===== */
.rcoc-build{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rcoc-build label{font-size:12px;font-weight:600;color:var(--gold-soft);letter-spacing:.3px;display:block;margin-bottom:5px}
.rcoc-build textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--ink);font-family:inherit;font-size:13.5px;resize:vertical;min-height:70px;outline:none;transition:.16s}
.rcoc-build textarea:focus{border-color:var(--gold)}
.prompt-out{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:11px;padding:16px;font-size:13.6px;color:var(--ink);white-space:pre-wrap;line-height:1.6;margin-top:14px;min-height:60px}
@media(max-width:760px){.rcoc-build{grid-template-columns:1fr}.role-grid{grid-template-columns:1fr}}

/* ===== certificate ===== */
.cert{border:2px solid var(--gold);border-radius:18px;padding:34px;text-align:center;background:linear-gradient(160deg,var(--card),var(--bg2));max-width:560px;margin:10px auto}
.cert .seal{font-size:42px}
.cert h2{font-family:var(--display);font-size:24px;font-weight:800;margin:8px 0}
.cert .cn{font-family:var(--display);font-size:20px;color:var(--gold-soft);font-weight:700;margin:6px 0}
.cert .cd{font-size:13px;color:var(--muted)}

/* ===== SR buttons (flashcard) ===== */
.sr-btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
.sr-known{background:var(--emerald-dim);color:var(--emerald);border:1px solid var(--emerald);font-weight:600;font-size:13px;padding:9px 18px;border-radius:10px;transition:.16s}
.sr-again{background:var(--rose-dim);color:var(--rose);border:1px solid var(--rose);font-weight:600;font-size:13px;padding:9px 18px;border-radius:10px;transition:.16s}
.sr-known:hover,.sr-again:hover{transform:translateY(-2px)}
.q-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.q-pill{font-size:12.5px;padding:7px 13px;border-radius:9px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);transition:.15s}
.q-pill:hover{border-color:var(--line2)}
.q-pill.active{background:var(--gold);color:#1a1206;font-weight:600}

/* ===== bottom nav (mobile) ===== */
.bnav{display:none}
@media(max-width:760px){
  .bnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:38;background:rgba(13,16,23,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:6px 4px}
  [data-theme="light"] .bnav{background:rgba(255,255,255,.96)}
  .bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted);font-size:9.5px;font-weight:500}
  .bnav button.active{color:var(--gold-soft)}
  .bnav svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
  .main{padding-bottom:78px !important}
}

/* ===== print ===== */
@media print{
  .sidebar,.topbar,.bnav,.overlay,.q-foot,.fc-nav,.sr-btns,.reset-link,.side-tools,.search-box{display:none !important}
  body{background:#fff;color:#000}
  .main{padding:0;max-width:none}
  .page{display:none !important}
  #printArea{display:block !important}
  .card,.gloss-item,.sys-table,.mis{break-inside:avoid;border-color:#ccc}
  *{color:#111 !important;background:#fff !important;box-shadow:none !important}
  .sys-table th,.sys-table td{border:1px solid #bbb}
}
#printArea{display:none}

/* checklist */
.cl-item{display:flex;align-items:center;gap:13px;padding:13px 16px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;transition:.18s}
.cl-item:hover{border-color:var(--line2)}
.cl-box{width:24px;height:24px;border-radius:7px;border:1.8px solid var(--line2);flex-shrink:0;display:grid;place-items:center;cursor:pointer;transition:.18s}
.cl-box svg{width:12px;height:12px;stroke:#0d1017;stroke-width:3;opacity:0}
.cl-item.done .cl-box{background:var(--emerald);border-color:var(--emerald)}
.cl-item.done .cl-box svg{opacity:1}
.cl-item.done span{color:var(--faint);text-decoration:line-through}
.cl-item span{font-size:14px}

.reset-link{font-size:12px;color:var(--faint);text-decoration:underline;cursor:pointer}
.reset-link:hover{color:var(--rose)}

/* mobile */
.menu-btn{display:none}
@media(max-width:920px){
  .g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:760px){
  .app{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:.3s;width:255px;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .sidebar.open{transform:none}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:35}
  .overlay.show{display:block}
  .topbar{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(13,16,23,.9);backdrop-filter:blur(12px);z-index:30}
  .topbar .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#b98722);display:grid;place-items:center;font-family:var(--display);font-weight:800;color:#1a1206;font-size:16px}
  .topbar h2{font-family:var(--display);font-size:15px;font-weight:700}
  .menu-btn{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;background:var(--bg2);border:1px solid var(--line)}
  .menu-btn svg{width:20px;height:20px;stroke:var(--ink);stroke-width:2;fill:none}
  .main{padding:24px 20px 70px}
  .g2,.g3,.g4,.stat-row{grid-template-columns:1fr}
  .flashcard{height:330px}
  .fc-face{padding:30px}
}
</style>
</head>

<script>
/* =========================================================
   DỮ LIỆU — tổng hợp & diễn giải từ hệ thống tài liệu OPC
   Nguồn: Tổng quan OPC · Điểm Archimedes · Pareto 80/20 ·
   Pre-mortem · Thư gửi tương lai · Playbook + Lộ trình 30 ngày
========================================================= */

const MESSAGES = [
  {t:"OPC không phải làm một mình", d:"\"Doanh nghiệp 1 người\" không có nghĩa tự tay làm hết, mà là có đủ HỆ THỐNG để vận hành mọi chức năng của một doanh nghiệp — với 1 con người + 12 AI Agent + một bộ não số.", s:"Tổng quan xây dựng OPC"},
  {t:"Doanh nghiệp đẻ ra hệ thống — không phải ngược lại", d:"Bán hàng trước, xây hệ thống sau. Cứ có doanh thu mới build thêm phòng ban. Đây là câu thần chú phân biệt người thành công với 80% người bỏ cuộc.", s:"Thư gửi tương lai · Pareto"},
  {t:"Không có doanh thu = không có hệ thống", d:"Mỗi tuần phải có ít nhất 1 đồng thật vào tài khoản. Hệ thống đẹp mà không có tiền là một lỗi thiết kế, không phải thành tựu.", s:"Pareto 80/20 (Nguyên tắc 2)"},
  {t:"ICP đúng là Điểm Archimedes", d:"Chân dung khách hàng lý tưởng (ICP) là 'prompt gốc' cho cả 12 Agent. Sai ICP → 30+ output phái sinh đều sai. Đúng ICP → mọi ad, script, tính năng tự đúng theo.", s:"Điểm Archimedes"},
  {t:"Cửa 1 chiều vs Cửa 2 chiều", d:"Nguyên tắc Bezos: quyết định đảo ngược được (cửa 2 chiều) → làm nhanh, thử liền. Quyết định khó quay đầu (cửa 1 chiều) → làm chậm, kỹ. Đừng tê liệt vì đối xử cửa 2 chiều như cửa 1 chiều.", s:"Điểm Archimedes"},
  {t:"3 lớp đòn bẩy", d:"Đòn bẩy KỸ THUẬT (automation setup 1 lần, hưởng mãi), đòn bẩy NỘI DUNG (1 tài sản gốc → dùng cho 12 phòng), đòn bẩy QUYẾT ĐỊNH (3 lựa chọn lớn định đoạt 80% kết quả).", s:"Điểm Archimedes"},
  {t:"Agent làm 90% — bạn làm 10% không thể thay thế", d:"Việc của bạn chỉ là: nói chuyện với khách, ra quyết định lớn, và sáng tạo định vị. Phần văn bản, render, tính toán… giao hết cho Agent.", s:"Pareto 80/20 (Nguyên tắc 3)"},
  {t:"Đo 7 số — không đo 50 số", d:"Dashboard CEO chỉ 1 trang với 7 chỉ số: Doanh thu tuần, Khách mới, CAC, Tỉ lệ chốt, NPS, Giờ làm, và 1 số tệ nhất tuần. Không đo = không cải thiện.", s:"Pareto · Lộ trình 30 ngày"},
  {t:"Cắt trước khi thêm", d:"Mỗi tuần xoá ít nhất 1 quy trình, template hoặc folder không dùng. Đơn giản = nhanh = lợi thế. Không giữ template nào quá 4 tuần nếu chưa dùng lần nào.", s:"Pareto · Pre-mortem"},

 "cskh":[{"t":"CES dự báo churn tốt hơn NPS 1.8 lần","d":"Customer Effort Score dự báo churn tốt hơn NPS 1.8 lần (Gartner) nhưng 80% founder Việt không biết. World-class CES < 2.0/7, SME Việt 3.5–4.5."},{"t":"FCR — chỉ số sống còn của CSKH","d":"Mỗi 1% FCR tăng giúp tiết kiệm 1% chi phí, +1.2 điểm CSAT, giảm churn 0.5–0.8%. SME Việt chỉ FCR 30–45% so với world-class > 75%."},{"t":"Chi phí phục vụ chênh 80–150 lần theo kênh","d":"Hotline 25–50k/cuộc vs chatbot AI 200–500đ/cuộc. Một D2C chuyển 70% sang chatbot tiết kiệm 1.45 tỷ/năm."},{"t":"Service Recovery Paradox","d":"Khiếu nại được xử lý xuất sắc → loyalty cao hơn cả khách chưa từng phàn nàn. Điều kiện: phản hồi < 4h, xin lỗi có tên, bồi thường ≥ 1.5x, follow-up 7 ngày."},{"t":"Bẫy pháp lý BVNTD & dữ liệu cá nhân","d":"Luật BVNTD 19/2023 buộc phản hồi khiếu nại trong 7 ngày, không thì phạt 20–40tr. Dùng AI API là chuyển dữ liệu ra nước ngoài → phải DPIA + đăng ký A05 (NĐ 13/2023)."}],

function overallPct(){
  const msg=Object.values(state.msgDone).filter(Boolean).length/MESSAGES.length;
  const act=Object.values(state.actDone).filter(Boolean).length/ACTIONS.length;
  const quiz=state.quizBest!=null?state.quizBest/QUIZ.length:0;
  const chk=Object.values(state.check).filter(Boolean).length/CHECKLIST.length;
  const fc=Object.keys(state.fcSeen).length/FLASHCARDS.length;
  return Math.round((msg+act+quiz+chk+fc)/5*100);
}

let qIdx=0,qScore=0,qAnswered=false,QZ=[],qWrong=[];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function genDeptQuiz(dk){
  const d=DEPARTMENTS[dk],out=[],oFw=[],oMis=[];
  Object.keys(DEPARTMENTS).forEach(k=>{if(k!==dk){DEPARTMENTS[k].frameworks.forEach(f=>oFw.push(f.n));DEPARTMENTS[k].mistakes.forEach(m=>oMis.push(m.t));}});
  d.frameworks.forEach(f=>{
    const opts=shuffle([f.n,...shuffle(oFw).slice(0,3)]);
    out.push({q:`Framework nào sau đây thuộc phòng ${d.name}?`,o:opts,a:opts.indexOf(f.n),e:`"${f.n}" là một trong 3 framework của phòng ${d.name}. ${f.d}`});
  });
  d.mistakes.slice(0,3).forEach(m=>{
    const opts=shuffle([m.t,...shuffle(oMis.filter(x=>x!==m.t)).slice(0,3)]);
    out.push({q:`Phòng ${d.name} cảnh báo sai lầm chí mạng nào?`,o:opts,a:opts.indexOf(m.t),e:`Đúng. Cách né: ${m.fix}`});
  });
  return shuffle(out).slice(0,6);
}
function quizSet(){
  if(DEPARTMENTS[state.quizMode])return genDeptQuiz(state.quizMode);
  return shuffle(QUIZ).map(q=>({q:q.q,o:q.o,a:q.a,e:q.e}));
}

  document.getElementById("pg-quiz").innerHTML=`

    <h1 class="h-title">Bạn đã thật sự hiểu chưa?</h1>
    <p class="h-sub">Chọn bộ đề: quiz tổng hợp nguyên tắc cốt lõi, hoặc quiz riêng từng phòng ban. Câu xáo trộn mỗi lần làm; có giải thích, ôn lại câu sai và chứng chỉ khi đạt ≥80%.</p>
    <div class="q-pills" style="margin-top:22px">
      <button class="q-pill ${state.quizMode==='all'?'active':''}" onclick="setQuizMode('all')">🎯 Tổng hợp</button>
      ${Object.keys(DEPARTMENTS).map(k=>`<button class="q-pill ${state.quizMode===k?'active':''}" onclick="setQuizMode('${k}')">${DEPARTMENTS[k].icon} ${DEPARTMENTS[k].name}</button>`).join("")}
    </div>
    <div class="quiz-shell" id="quizShell" style="margin-top:10px"></div>`;
  drawQ();
}
function setQuizMode(m){state.quizMode=m;save();renderNav();renderQuiz();}
function drawQ(){
  const shell=document.getElementById("quizShell");
  const q=QZ[qIdx];qAnswered=false;
  const prog=Math.round((qIdx)/QZ.length*100);
  shell.innerHTML=`
    <div class="q-progress"><span style="width:${prog}%"></span></div>
    <div class="card q-card">
      <div class="qnum">CÂU ${qIdx+1} / ${QZ.length}</div>
      <div class="qtext">${q.q}</div>
      <div id="opts">${q.o.map((o,i)=>`
        <button class="opt" onclick="answer(${i})">
          <span class="key">${String.fromCharCode(65+i)}</span><span>${o}</span>
        </button>`).join("")}</div>
      <div class="explain" id="explain"></div>
      <div class="q-foot">
        <span style="color:var(--muted);font-size:13px">Điểm: <b style="color:var(--gold-soft)">${qScore}</b></span>
        <button class="btn" id="nextBtn" disabled onclick="nextQ()">${qIdx===QZ.length-1?'Xem kết quả':'Câu tiếp →'}</button>
      </div>
    </div>`;
}
function answer(i){
  if(qAnswered)return;qAnswered=true;
  const q=QZ[qIdx];
  document.querySelectorAll("#opts .opt").forEach((o,idx)=>{
    o.disabled=true;
    if(idx===q.a)o.classList.add("correct");
    if(idx===i&&i!==q.a)o.classList.add("wrong");
  });
  if(i===q.a)qScore++; else qWrong.push(q);
  const ex=document.getElementById("explain");
  ex.innerHTML=(i===q.a?'<b>✓ Chính xác. </b>':'<b>✗ Chưa đúng. </b>')+q.e;
  ex.classList.add("show");
  document.getElementById("nextBtn").disabled=false;
}
function nextQ(){
  if(qIdx<QZ.length-1){qIdx++;drawQ();window.scrollTo({top:0,behavior:'smooth'});}
  else finishQuiz();
}
function retryWrong(){
  QZ=shuffle(qWrong);qIdx=0;qScore=0;qAnswered=false;qWrong=[];drawQ();window.scrollTo({top:0,behavior:'smooth'});
}
function finishQuiz(){
  const total=QZ.length;
  if(state.quizMode==="all"&&(state.quizBest==null||qScore>state.quizBest)){state.quizBest=qScore;save();renderNav();}
  const pc=Math.round(qScore/total*100);
  const label=state.quizMode==="all"?"Nguyên tắc cốt lõi OPC":("Phòng "+(DEPARTMENTS[state.quizMode]?DEPARTMENTS[state.quizMode].name:""));
  let msg,emo;
  if(pc>=80){msg="Xuất sắc! Bạn đã nắm vững nội dung. Đây là chứng chỉ hoàn thành của bạn.";emo="🏆";}
  else if(pc>=50){msg="Khá tốt! Ôn lại các câu sai rồi thử lại để đạt chứng chỉ ≥80%.";emo="💪";}
  else{msg="Cần ôn thêm. Xem lại Kiến thức nền & Flashcards rồi làm lại nhé.";emo="📚";}
  const cert=pc>=80?`
    <div class="cert">
      <div class="seal">🏅</div>
      <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Chứng chỉ hoàn thành</div>
      <h2>${label}</h2>
      <div class="cn">Đạt ${pc}% (${qScore}/${total})</div>
      <div class="cd">One Person Company · Xây dựng & Vận hành Hệ thống — ${new Date().toLocaleDateString('vi-VN')}</div>
    </div>`:"";
  document.getElementById("quizShell").innerHTML=`
    ${cert}
    <div class="card result">
      <div style="font-size:40px;margin-bottom:6px">${emo}</div>
      <div class="big">${qScore}/${total}</div>
      <h3>${pc}% chính xác</h3>
      <p>${msg}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${qWrong.length?`<button class="btn" onclick="retryWrong()">↻ Ôn lại ${qWrong.length} câu sai</button>`:""}
        <button class="btn ghost" onclick="renderQuiz()">↺ Làm lại từ đầu</button>
        <button class="btn ghost" onclick="go('flashcards')">Ôn Flashcards</button>
      </div>
    </div>`;
}

/* ---- FLASHCARDS ---- */
let fcIdx=0, fcDeck=[];
const SR_INT=[0,1,3,7,21,60];
function fcDue(i){const s=state.fcSR[i];if(!s)return true;return (s.due||0)<=Date.now();}
function fcDueCount(){let n=0;for(let i=0;i<FLASHCARDS.length;i++)if(fcDue(i))n++;return n;}
function buildDeck(){
  if(state.fcMode==="due"){fcDeck=[];for(let i=0;i<FLASHCARDS.length;i++)if(fcDue(i))fcDeck.push(i);}
  else{fcDeck=FLASHCARDS.map((_,i)=>i);}
  fcIdx=0;
}
function renderFlashcards(){
  buildDeck();
  const due=fcDueCount();
  document.getElementById("pg-flashcards").innerHTML=`
    <div class="eyebrow">● Flashcards ôn tập</div>
    <h1 class="h-title">Ôn nhanh & nhớ lâu</h1>
    <p class="h-sub">Bấm thẻ để lật. Sau khi xem, chấm "Đã thuộc" hoặc "Cần ôn lại" — app nhắc ôn theo lịch 1·3·7·21·60 ngày để chống đường cong lãng quên Ebbinghaus.</p>
    <div class="q-pills" style="margin-top:22px">
      <button class="q-pill ${state.fcMode==='all'?'active':''}" onclick="setFcMode('all')">Tất cả (${FLASHCARDS.length})</button>
      <button class="q-pill ${state.fcMode==='due'?'active':''}" onclick="setFcMode('due')">Đến hạn ôn (${due})</button>
    </div>
    <div id="fcArea"></div>`;
  renderFcArea();
}
function setFcMode(m){state.fcMode=m;save();renderFlashcards();}
function renderFcArea(){
  const area=document.getElementById("fcArea");
  if(!fcDeck.length){
    area.innerHTML=`<div class="card" style="text-align:center;padding:40px"><div style="font-size:42px">🎉</div><h3 style="font-family:var(--display);margin:10px 0">Không còn thẻ đến hạn ôn!</h3><p style="color:var(--muted)">Quay lại sau theo lịch, hoặc chuyển sang "Tất cả" để ôn thêm.</p></div>`;return;
  }
  const learned=Object.values(state.fcSR).filter(s=>s&&s.lvl>=2).length;
  area.innerHTML=`
    <div class="fc-bar">
      <div class="fc-counter">Thẻ <b id="fcNum">1</b> / ${fcDeck.length}</div>
      <span class="pill em">Đã thuộc: ${learned}/${FLASHCARDS.length}</span>
    </div>
    <div class="flashcard" id="flashcard" onclick="flipFc()"></div>
    <div class="sr-btns">
      <button class="sr-again" onclick="srMark(0);event.stopPropagation()">↻ Cần ôn lại</button>
      <button class="sr-known" onclick="srMark(1);event.stopPropagation()">✓ Đã thuộc</button>
    </div>
    <div class="fc-nav">
      <button class="btn ghost" onclick="moveFc(-1);event.stopPropagation()">← Trước</button>
      <button class="btn ghost" onclick="flipFc();event.stopPropagation()">⟲ Lật</button>
      <button class="btn" onclick="moveFc(1);event.stopPropagation()">Sau →</button>
    </div>
    <div class="fc-dot-row" id="fcDots"></div>`;
  drawFc();
}
function drawFc(){
  if(!fcDeck.length)return;
  const ci=fcDeck[fcIdx], f=FLASHCARDS[ci];
  const fc=document.getElementById("flashcard"); if(!fc)return;
  fc.classList.remove("flipped");
  const s=state.fcSR[ci]; const lvlTxt=s?`Mức nhớ ${s.lvl}/5`:"Thẻ mới";
  fc.innerHTML=`
    <div class="fc-inner">
      <div class="fc-face fc-front">
        <span class="pill ${f.tag} tag">${lvlTxt}</span>
        <div class="term">${f.term}</div>
        <div class="hint">👆 Chạm để xem định nghĩa</div>
      </div>
      <div class="fc-face fc-back">
        <div class="def">${f.def}</div>
        <div class="src">📄 ${f.s}</div>
      </div>
    </div>`;
  document.getElementById("fcNum").textContent=fcIdx+1;
  document.getElementById("fcDots").innerHTML=fcDeck.map((_,i)=>
    `<span class="fc-dot ${i===fcIdx?'active':''}" onclick="fcIdx=${i};drawFc()"></span>`).join("");
}
function flipFc(){
  const fc=document.getElementById("flashcard"); if(!fc)return;
  fc.classList.toggle("flipped");
  const ci=fcDeck[fcIdx]; if(ci!=null&&!state.fcSeen[ci]){state.fcSeen[ci]=true;save();}
}
function srMark(known){
  const ci=fcDeck[fcIdx]; if(ci==null)return;
  let s=state.fcSR[ci]||{lvl:0,due:0};
  s.lvl=known?Math.min((s.lvl||0)+1,5):0;
  s.due=Date.now()+SR_INT[s.lvl]*86400000;
  state.fcSR[ci]=s; state.fcSeen[ci]=true; save();
  if(fcIdx<fcDeck.length-1){fcIdx++;drawFc();}
  else{ if(state.fcMode==="due")renderFlashcards(); else {fcIdx=0;drawFc();} }
}
function moveFc(d){ if(!fcDeck.length)return; fcIdx=(fcIdx+d+fcDeck.length)%fcDeck.length; drawFc(); }

    const grp=(label,sub)=>{const fs=inf.files.filter(f=>f.s===sub);if(!fs.length)return"";return `<div class="section-head" style="margin:20px 0 10px"><h3>${label}</h3></div>`+fs.map(f=>fileLink(inf.dir,f)).join("");};
    body.innerHTML=`
      <p style="color:var(--muted);font-size:13.6px;margin-bottom:10px">📥 Các file <b>.md</b> gốc của phòng <b>${d.name}</b> trong <code style="color:var(--gold-soft);font-family:monospace">business-os/${inf.dir}/</code>. Bấm để tải về, rồi thả vào đúng thư mục trong Obsidian Vault để vận hành agent.</p>
      <div class="card" style="border-left:3px solid var(--gold);padding:13px 16px;margin-bottom:6px;font-size:12.5px;color:var(--muted)">⚠️ Nút tải hoạt động khi file app <b>đặt cùng cấp</b> với thư mục <code style="font-family:monospace">business-os</code> (đường dẫn tương đối). Nếu trình duyệt mở file thay vì tải, bấm chuột phải → "Lưu liên kết".</div>
      <a class="dl-file" style="border-style:dashed" href="${encodeURI('business-os/'+inf.dir)}/" target="_blank"><span class="dl-ic">📂</span><span class="dl-n">Mở thư mục phòng này</span><span class="dl-p">business-os/${inf.dir}/</span></a>
      ${grp("📜 ROLE.md — Instruction gốc của agent","")}
      ${grp("📚 knowledge/ — Kho kiến thức chuyên ngành","knowledge")}
      ${grp("📋 templates/ — Mẫu output","templates")}`;
  }else{ // gap
    if(!d.gap||!d.gap.length){body.innerHTML=`<div class="card"><p style="color:var(--muted)">Tài liệu phòng này chưa kèm bộ Knowledge Gap riêng.</p></div>`;return;}
    const done=Object.keys(state.deptDone[state.dept]||{}).filter(k=>state.deptDone[state.dept][k]).length;
    body.innerHTML=`
      <div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:16px;background:var(--accent-grad)">
        <span class="pill em">${done}/${d.gap.length} đã kiểm tra</span>
        <p style="color:var(--muted);font-size:13px;flex:1">Đặt từng câu cho nhân viên/AI Agent. Nếu không trả lời được → Instruction + Knowledge Base đang yếu, cần nạp thêm. Bấm để đánh dấu đã kiểm tra.</p>
      </div>
      ${d.gap.map((q,i)=>{
        const ok=(state.deptDone[state.dept]||{})[i];
        return `<div class="gap-item ${ok?'ok':''}" onclick="toggleGap(${i})">
          <span class="qn">${i+1}</span><span class="qx">${q}</span>
          <span class="tk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-11"/></svg></span>
        </div>`;
      }).join("")}`;
  }
}
function fileLink(dir,f){
  const segs=["business-os",dir].concat(f.s?[f.s]:[]).concat([f.n]);
  const href=segs.map(encodeURIComponent).join("/");
  return `<a class="dl-file" href="${href}" download="${f.n}"><span class="dl-ic">⬇</span><span class="dl-n">${f.n}</span><span class="dl-p">${f.s||"gốc"}</span></a>`;
}
function setDept(k){state.dept=k;save();renderDepartments();}
function setDeptTab(t){state.deptTab=t;save();
  document.querySelectorAll("#pg-departments .dtab").forEach(b=>b.classList.remove("active"));
  renderDepartments();}
function toggleGap(i){
  if(!state.deptDone[state.dept])state.deptDone[state.dept]={};
  state.deptDone[state.dept][i]=!state.deptDone[state.dept][i];save();renderDeptBody();
}

/* ---- THEME ---- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme",state.theme);
  const b=document.getElementById("themeBtn"); if(b)b.textContent=state.theme==="light"?"☀️":"🌙";
}
function toggleTheme(){state.theme=state.theme==="light"?"dark":"light";save();applyTheme();}

/* ---- SEARCH ---- */
function buildSearchIndex(){
  const idx=[];
  MESSAGES.forEach((m,i)=>idx.push({tag:"Thông điệp",t:m.t,d:m.d,page:"messages"}));
  ACTIONS.forEach(a=>idx.push({tag:"Hành động",t:a.t,d:a.li[0],page:"actions"}));
  FLASHCARDS.forEach(f=>idx.push({tag:"Flashcard",t:f.term,d:f.def,page:"flashcards"}));
  MISTAKES.forEach(m=>idx.push({tag:"Sai lầm",t:m.t,d:m.fix,page:"mistakes"}));
  GLOSSARY.forEach(g=>idx.push({tag:"Thuật ngữ",t:g.term,d:g.def,page:"glossary"}));
  Object.keys(DEPARTMENTS).forEach(k=>{
    const d=DEPARTMENTS[k];
    idx.push({tag:"Phòng ban",t:d.name,d:"5 sai lầm · 3 framework · 7 tầng · knowledge gap",page:"departments",dept:k});
    (DEPT_BASICS[k]||[]).forEach(x=>idx.push({tag:"Kiến thức nền · "+d.name,t:x.t,d:x.d,page:"departments",dept:k,dtab:"basics"}));
    d.frameworks.forEach(f=>idx.push({tag:"Framework · "+d.name,t:f.n,d:f.d,page:"departments",dept:k,dtab:"frameworks"}));
    d.mistakes.forEach(m=>idx.push({tag:"Sai lầm · "+d.name,t:m.t,d:m.fix,page:"departments",dept:k,dtab:"mistakes"}));
  });
  return idx;
}
let SEARCH_INDEX=null, lastResults=[];
function doSearch(q){
  if(!SEARCH_INDEX)SEARCH_INDEX=buildSearchIndex();
  q=(q||"").trim().toLowerCase();
  if(q.length<2){lastResults=[];if(state&&document.getElementById("pg-search").classList.contains("show"))renderSearchPage();return;}
  const norm=s=>(s||"").toLowerCase();
  lastResults=SEARCH_INDEX.filter(x=>norm(x.t).includes(q)||norm(x.d).includes(q)||norm(x.tag).includes(q)).slice(0,40);
  go("search");renderSearchPage();
}
function renderSearchPage(){
  const q=(document.getElementById("globalSearch")||{}).value||"";
  document.getElementById("pg-search").innerHTML=`
    <div class="eyebrow">● Tìm kiếm</div>
    <h1 class="h-title">Kết quả tìm kiếm</h1>
    <p class="h-sub">${q?`Cho "<b>${q}</b>" — ${lastResults.length} kết quả`:"Gõ từ khoá vào ô tìm kiếm (vd: ICP, BHXH, OODA, debate, retention)."}</p>
    <div class="search-results" style="margin-top:24px">
      ${lastResults.length?lastResults.map((r,i)=>`
        <div class="sr-item" onclick="openResult(${i})">
          <div class="sr-tag">${r.tag}</div>
          <div class="sr-t">${r.t}</div>
          <div class="sr-d">${r.d||""}</div>
        </div>`).join(""):(q.length>=2?`<div class="sr-empty">Không tìm thấy. Thử từ khoá khác.</div>`:"")}
    </div>`;
}
function openResult(i){
  const r=lastResults[i]; if(!r)return;
  if(r.dept){state.dept=r.dept;}
  if(r.dtab){state.deptTab=r.dtab;}
  save();
  if(r.page==="departments"){renderDepartments();}
  go(r.page);
}
function focusSearch(){go("search");renderSearchPage();const el=document.getElementById("globalSearch");if(el)el.focus();}

/* ---- EXPORT / IMPORT PROGRESS ---- */
function exportProgress(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="tien-do-hoc-opc.json";a.click();URL.revokeObjectURL(a.href);
}
function importProgress(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{try{const o=JSON.parse(e.target.result);Object.assign(state,o);save();applyTheme();buildAll();renderNav();go("dashboard");alert("Đã nhập tiến độ thành công.");}
    catch(err){alert("File không hợp lệ.");}};
  rd.readAsText(file);
}

/* ---- GLOSSARY ---- */
function renderGlossary(flt){
  flt=(flt||"").trim().toLowerCase();
  const items=GLOSSARY.filter(g=>!flt||g.term.toLowerCase().includes(flt)||g.def.toLowerCase().includes(flt))
    .slice().sort((a,b)=>a.term.localeCompare(b.term));
  document.getElementById("pg-glossary").innerHTML=`
    <div class="eyebrow">● Thuật ngữ</div>
    <h1 class="h-title">Từ điển thuật ngữ OPC</h1>
    <p class="h-sub">${GLOSSARY.length} thuật ngữ quan trọng — giải thích ngắn gọn để người mới không bị ngợp.</p>
    <div class="search-box" style="max-width:420px;margin-top:20px"><span class="sx">🔍</span><input placeholder="Lọc thuật ngữ…" oninput="renderGlossary(this.value)" value="${flt?flt:''}"/></div>
    <div class="grid g2" style="margin-top:18px">
      ${items.map(g=>`<div class="gloss-item"><div class="gt">${g.term}</div><div class="gd">${g.def}</div></div>`).join("")||'<div class="sr-empty">Không có thuật ngữ khớp.</div>'}
    </div>`;
}

/* ---- TOOLS: R-C-O-C builder + Skill Matrix ---- */
function renderTools(){
  document.getElementById("pg-tools").innerHTML=`
    <div class="eyebrow">● Công cụ thực hành</div>
    <h1 class="h-title">Thực hành & tự đánh giá</h1>
    <p class="h-sub">Hai công cụ giúp anh áp dụng ngay: ghép một prompt chuẩn theo R-C-O-C, và tự chấm năng lực từng phòng ban để biết nên học gì trước.</p>

    <div class="section-head"><h3>① Trình tạo prompt R-C-O-C</h3><p>Điền 4 ô → app ghép thành câu lệnh chuẩn để gửi cho Claude/agent.</p></div>
    <div class="rcoc-build">
      <div><label>R — Role (vai trò agent)</label><textarea id="rc_r" oninput="buildPrompt()" placeholder="vd: CFO Agent"></textarea></div>
      <div><label>C — Context (bối cảnh, mục tiêu)</label><textarea id="rc_c" oninput="buildPrompt()" placeholder="vd: lập ngân sách marketing tháng 7/2026 cho chuỗi cà phê, dựa trên Budget.md"></textarea></div>
      <div><label>O — Output (định dạng)</label><textarea id="rc_o" oninput="buildPrompt()" placeholder="vd: bảng markdown + cảnh báo rủi ro"></textarea></div>
      <div><label>C — Constraints (ràng buộc)</label><textarea id="rc_cc" oninput="buildPrompt()" placeholder="vd: tổng chi ≤ 50tr, tối thiểu 20% cho retention"></textarea></div>
    </div>
    <div class="prompt-out" id="promptOut">Prompt của anh sẽ hiện ở đây…</div>
    <button class="btn" style="margin-top:12px" onclick="copyPrompt()">📋 Copy prompt</button>

    <div class="section-head"><h3>② Tự đánh giá năng lực (Skill Matrix)</h3><p>Chấm mức 0–4 cho từng phòng (0 = chưa biết, 4 = dạy lại được). App tô màu điểm mạnh/yếu.</p></div>
    <div id="skillBox"></div>`;
  buildPrompt();renderSkill();
}
function buildPrompt(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  const r=g("rc_r").trim(),c=g("rc_c").trim(),o=g("rc_o").trim(),cc=g("rc_cc").trim();
  let p="";
  if(r)p+=`Với vai trò **${r}**, `;
  p+= c?`hãy ${c}.`:"hãy …";
  if(o)p+=`\nOutput: ${o}.`;
  if(cc)p+=`\nRàng buộc: ${cc}.`;
  document.getElementById("promptOut").textContent=(r||c||o||cc)?p:"Prompt của anh sẽ hiện ở đây…";
}
function copyPrompt(){
  const t=document.getElementById("promptOut").textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>alert("Đã copy prompt!"),()=>{});
}
function renderSkill(){
  const keys=Object.keys(DEPARTMENTS);
  const vals=keys.map(k=>state.skill[k]).filter(v=>v!=null&&v!=="");
  const avg=vals.length?(vals.reduce((a,b)=>a+(+b),0)/vals.length).toFixed(1):"–";
  const strong=keys.filter(k=>+state.skill[k]>=3).length;
  const weak=keys.filter(k=>state.skill[k]!=null&&+state.skill[k]<=1).map(k=>DEPARTMENTS[k].name);
  document.getElementById("skillBox").innerHTML=`
    <div class="card" style="margin-bottom:14px;display:flex;gap:22px;flex-wrap:wrap;align-items:center;background:var(--accent-grad)">
      <div><div style="font-family:var(--display);font-size:26px;font-weight:800;color:var(--gold-soft)">${avg}</div><div style="font-size:12px;color:var(--muted)">Điểm TB</div></div>
      <div><div style="font-family:var(--display);font-size:26px;font-weight:800;color:var(--emerald)">${strong}/${keys.length}</div><div style="font-size:12px;color:var(--muted)">Phòng đạt L3+</div></div>
      <div style="flex:1;min-width:180px;font-size:12.5px;color:var(--muted)">${weak.length?("⚠️ Cần ưu tiên học: "+weak.join(", ")):"Chấm điểm để thấy gợi ý ưu tiên học."}</div>
    </div>
    <div class="card" style="padding:6px 20px">
      ${keys.map(k=>{
        const cur=state.skill[k];
        return `<div class="skill-row">
          <div class="sk-n">${DEPARTMENTS[k].icon} ${DEPARTMENTS[k].name}</div>
          <div class="sk-levels">${[0,1,2,3,4].map(l=>`<div class="sk-dot l${l} ${(+cur===l)?'on':''}" onclick="setSkill('${k}',${l})" title="Mức ${l}">${l}</div>`).join("")}</div>
        </div>`;
      }).join("")}
    </div>
    <p style="color:var(--faint);font-size:12px;margin-top:10px">Thang: 0 chưa biết · 1 biết khái niệm · 2 làm được khi có hướng dẫn · 3 làm độc lập · 4 dạy lại được.</p>`;
}
function setSkill(k,l){state.skill[k]=l;save();renderSkill();}

/* ---- ROLE PATH ---- */
function setRole(id){state.role=(state.role===id?"":id);save();renderDepartments();}

/* ---- PRINT DEPARTMENT ---- */
function printDept(){
  const d=DEPARTMENTS[state.dept]; if(!d)return;
  const basics=(DEPT_BASICS[state.dept]||[]);
  const h=`
    <div style="font-family:Arial,sans-serif;max-width:760px;margin:0 auto;padding:24px">
      <h1 style="font-size:22px">${d.icon} Phòng ${d.name} — Cẩm nang đào tạo</h1>
      <p style="color:#555;font-size:12px">One Person Company · Tài liệu huấn luyện nhân viên & AI Agent</p>
      ${basics.length?`<h2 style="font-size:16px;margin-top:18px">20% Kiến thức nền</h2>${basics.map(x=>`<p><b>${x.t}.</b> ${x.d}</p>`).join("")}`:""}
      <h2 style="font-size:16px;margin-top:18px">5 Sai lầm chí mạng</h2>
      ${d.mistakes.map((m,i)=>`<p><b>${i+1}. ${m.t}.</b> Cách né: ${m.fix}</p>`).join("")}
      <h2 style="font-size:16px;margin-top:18px">3 Framework cao cấp</h2>
      ${d.frameworks.map(f=>`<p><b>${f.n}.</b> ${f.d}</p>`).join("")}
      <h2 style="font-size:16px;margin-top:18px">Bộ câu hỏi 7 tầng</h2>
      ${d.layers7.map((q,i)=>`<p>${q}</p>`).join("")}
      <h2 style="font-size:16px;margin-top:18px">Knowledge Gap — bài tự kiểm tra</h2>
      ${d.gap.map((q,i)=>`<p>${i+1}. ${q}</p>`).join("")}
    </div>`;
  const pa=document.getElementById("printArea");pa.innerHTML=h;
  window.print();
  setTimeout(()=>{pa.innerHTML="";},500);
}

/* ---- RESET ---- */
function resetAll(){
  if(confirm("Đặt lại toàn bộ tiến độ học tập? Hành động này không thể hoàn tác.")){
    localStorage.removeItem(KEY);state=load();
    def("msgDone",{});def("actDone",{});def("plan",{});def("planMode","7");
    def("check",{});def("quizBest",null);def("fcSeen",{});
    def("dept",Object.keys(DEPARTMENTS)[0]);def("deptTab","basics");def("deptDone",{});
    def("sysTab","kien-truc");
    def("fcSR",{});def("fcMode","all");def("quizMode","all");
    def("role","");def("skill",{});def("theme","dark");
    save();applyTheme();
    buildAll();renderNav();go('dashboard');
  }
}

/* ---- KEYBOARD for flashcards ---- */
document.addEventListener("keydown",e=>{
  if(current!=="flashcards")return;
  if(e.key==="ArrowRight")moveFc(1);
  else if(e.key==="ArrowLeft")moveFc(-1);
  else if(e.key===" "||e.key==="Enter"){e.preventDefault();flipFc();}
});

/* ---- INIT ---- */
applyTheme();renderNav();buildAll();go('dashboard');
</script>
</body>
</html>
